when:
  - event: [pull_request, pull_request_closed]
  - event: manual
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}

labels:
  type: static

depends_on:
  - lint

steps:
  - name: Build
    image: reg.ricochet.rs/docker.io/oven/bun:1.3
    commands:
      - bun install
      - bun astro build

  - name: PR docs preview
    image: codeberg.org/woodpecker-plugins/plugin-surge-preview:1.4.2
    settings:
      path: "./dist"
      surge_token:
        from_secret: surge_token
      forge_repo_token:
        from_secret: ricochet_issue_token
      forge_type: github
    when:
      - event: [pull_request, pull_request_closed]

  - name: "Upload to S3"
    image: reg.ricochet.rs/docker.io/woodpeckerci/plugin-s3:1.5.3
    settings:
      bucket: ricochet-docs
      region: eu-central-003
      endpoint: https://s3.eu-central-003.backblazeb2.com
      access_key:
        from_secret:
          from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: keyID
      secret_key:
        from_secret:
          from_secret:
          integration: 1
          path: backblaze/tokens/cicd
          key: applicationKey
      source: dist/**/*
      strip_prefix: dist/
      overwrite: true
      retry_count: 3
      path_style: true
    when:
      - event: manual
      - event: push
        branch: ${CI_REPO_DEFAULT_BRANCH}
